# Dependabot keeps Go module and GitHub Actions dependencies current so
# security fixes show up as PRs rather than slipping past. Each ecosystem
# is grouped into one weekly PR so bumps share a single lockfile change
# instead of stacking conflicting updates.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      go-modules:
        patterns:
          - "*"
    ignore:
      # x/term is held at 0.27.0 on purpose. xfiles uses one frozen function
      # from it (term.IsTerminal); newer releases add nothing we touch and only
      # raise their go directive (0.44.0 needs go 1.25), which would drag the
      # module off go 1.24. Revisit if/when the fleet moves to 1.25.
      - dependency-name: "golang.org/x/term"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
